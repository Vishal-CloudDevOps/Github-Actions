# ============================================================
# Project 01 — Basic Node.js CI Pipeline
# ============================================================
# CONCEPTS TAUGHT:
#   - Workflow triggers (push, pull_request, workflow_dispatch)
#   - Jobs and Steps
#   - actions/setup-node
#   - Dependency caching (speeds up pipelines significantly)
#   - Running lint and unit tests
#   - Uploading coverage artifacts
#   - Dependency vulnerability scanning (npm audit)
#   - Secret scanning with Gitleaks
# ============================================================

name: 01 — Node.js Basic CI

on:
  # Trigger on pushes to main or develop branches
  push:
    branches: [main, develop]
    paths:
      - 'project-01-nodejs-basic-ci/**'
      - '.github/workflows/01-nodejs-basic-ci.yml'

  # Trigger on PRs targeting main
  pull_request:
    branches: [main]
    paths:
      - 'project-01-nodejs-basic-ci/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '20'
        type: choice
        options: ['18', '20', '22']

# Restrict token permissions to minimum required (security best practice)
permissions:
  contents: read        # Read repo code
  checks: write         # Write test results as checks

# Prevent duplicate runs: cancel in-progress runs when a new one starts
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # JOB: Secret Scanning
  # Runs Gitleaks to detect accidentally committed secrets
  # ──────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so Gitleaks can scan all commits
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false  # Fail pipeline if secrets are found

  # ──────────────────────────────────────────
  # JOB: Lint
  # Checks code quality with ESLint
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint (ESLint)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: project-01-nodejs-basic-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Use input version if manually triggered, otherwise default to 20
          node-version: ${{ inputs.node_version || '20' }}
          # Cache npm dependencies — key is based on package-lock.json hash
          # If the lockfile hasn't changed, the cache is reused (saves ~30s)
          cache: 'npm'
          cache-dependency-path: project-01-nodejs-basic-ci/package-lock.json

      - name: Install dependencies
        # `npm ci` is faster and safer than `npm install` in CI:
        # - Uses exact versions from package-lock.json
        # - Fails if package-lock.json is out of date
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────
  # JOB: Test
  # Runs Jest unit tests with coverage
  # ──────────────────────────────────────────
  test:
    name: 🧪 Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project-01-nodejs-basic-ci

    strategy:
      # Test on multiple Node.js versions to ensure compatibility
      matrix:
        node-version: ['18', '20']
      # Continue testing other versions even if one fails
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: project-01-nodejs-basic-ci/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          # CI=true makes Jest output cleaner and disables interactive prompts
          CI: true

      - name: Upload coverage report
        # Only upload coverage once (not for every matrix version)
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: project-01-nodejs-basic-ci/coverage/
          # Keep coverage reports for 7 days
          retention-days: 7

  # ──────────────────────────────────────────
  # JOB: Dependency Security Audit
  # Scans npm dependencies for known vulnerabilities
  # ──────────────────────────────────────────
  dependency-audit:
    name: 🛡️ Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: project-01-nodejs-basic-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project-01-nodejs-basic-ci/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # --audit-level=high: only fail on HIGH or CRITICAL vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true  # Report but don't block on moderate issues

  # ──────────────────────────────────────────
  # JOB: Build Summary
  # Final job that summarizes the pipeline result
  # ──────────────────────────────────────────
  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, dependency-audit]
    if: always()  # Always run summary even if other jobs fail

    steps:
      - name: Write job summary
        run: |
          echo "## 🚀 CI Pipeline Summary — Project 01" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
